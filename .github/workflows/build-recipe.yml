name: build-gale
permissions: {}
on:
  workflow_call:
    inputs:
      recipe:
        type: string
        required: true
      rechunk:
        type: boolean
        required: false
        default: false
      clear-plan:
        type: boolean
        required: false
        default: false
    secrets:
      SIGNING_SECRET:
        required: true

concurrency: # only run one build at a time
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}-${{ inputs.recipe }}
  cancel-in-progress: true

jobs:
  bluebuild:
    name: Build Image
    runs-on: ubuntu-24.04
    environment: Build
    outputs:
      FULL_IMAGE_REF: ${{ steps.runner_setup.outputs.FULL_IMAGE_REF }}
      IMAGE_DIGEST: ${{ steps.image_manifest_metadata.outputs.IMAGE_DIGEST }}
    permissions:
      contents: read # needed to pull repo for building
      packages: write # neded for publishing
      id-token: write # needed for signing

    steps:
      # egress monitoring and filtering
      - name: Harden Runner
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df # v2.18.0
        with:
          egress-policy: audit

      # disable saving the token
      - name: Checkout repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Runner setup
        id: runner_setup
        uses: ./.github/workflows/runner-setup
        with:
          recipe: ${{ inputs.recipe }}

      - name: Decide whether to clear previous layer plan
        id: clear_plan
        shell: bash
        env:
          rechunk: ${{ inputs.rechunk }}
          input_clear_plan: ${{ inputs.clear-plan }}
          FULL_IMAGE_REF: ${{ steps.runner_setup.outputs.FULL_IMAGE_REF }}
        run: |
          clear_plan='false'
          if [[ "$input_clear_plan" == 'true' ]]; then
            clear_plan='true'
          elif [[ "$rechunk" == 'true' ]]; then
            previous_build_created=$(skopeo inspect -n "docker://${FULL_IMAGE_REF}" 2>/dev/null | jq -cr '.Created' || echo "")
            if [[ -n "$previous_build_created" ]]; then
              # Clear previous layer plan only on the first build of each month.
              current_month=$(date -u '+%Y-%m')
              previous_build_month=$(date -u -d "$previous_build_created" '+%Y-%m')
              if [[ "$previous_build_month" != "$current_month" ]]; then
                clear_plan='true'
              fi
            fi
          fi
          echo "clear_plan=${clear_plan}" >> "${GITHUB_OUTPUT}"

      # the build is fully handled by the reusable github action
      - name: Build Gale
        uses: blue-build/github-action@24d146df25adc2cf579e918efe2d9bff6adea408 # v1.11.1
        with:
          cli_version: v0.9.33
          recipe: ${{ inputs.recipe }}
          cosign_private_key: ${{ secrets.SIGNING_SECRET }}
          registry_token: ${{ github.token }}
          pr_event_number: ${{ github.event.number }}
          maximize_build_space: true
          squash: true
          build_chunked_oci: ${{ inputs.rechunk }}
          max_layers: 128
          rechunk_clear_plan: ${{ steps.clear_plan.outputs.clear_plan }}
          skip_checkout: true
          use_cache: false
          retry_push_count: 3
          verify_install: true

      - name: Install regctl
        uses: regclient/actions/regctl-installer@1b705e32d40851370799ea5814e83d0a5f6a70dc # v0.1.0

      - name: Parse image manifest
        id: image_manifest_metadata
        shell: bash
        env:
          FULL_IMAGE_REF: ${{ steps.runner_setup.outputs.FULL_IMAGE_REF }}
        run: |
          IMAGE_DIGEST=$(regctl image digest "${FULL_IMAGE_REF}")
          echo "IMAGE_DIGEST=${IMAGE_DIGEST}" >> "${GITHUB_OUTPUT}"


  provenance:
    needs: [bluebuild]
    permissions:
      actions: read # for detecting the Github Actions environment.
      id-token: write # for creating OIDC tokens for signing.
      packages: write # for uploading attestations.
    # Currently this must be referenced by tag, not by hash:
    # https://github.com/slsa-framework/slsa-github-generator?tab=readme-ov-file#referencing-slsa-builders-and-generators
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_container_slsa3.yml@v2.1.0
    with:
      image: ${{ needs.bluebuild.outputs.FULL_IMAGE_REF }}
      digest: ${{ needs.bluebuild.outputs.IMAGE_DIGEST }}
      registry-username: ${{ github.actor }}
    secrets:
      registry-password: ${{ secrets.GITHUB_TOKEN }}