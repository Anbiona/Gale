name: gale-main
description: Hardened server image based on secureblue iot-main-hardened.

# pull latest secureblue iot-main-hardened image
base-image: ghcr.io/secureblue/iot-main-hardened
image-version: latest

cosign-version: none
nushell-version: none

platforms:
  - linux/amd64

modules:

  - type: dnf
    install:
      packages:
        - nano
    remove:
      packages:

  - type: signing # this sets up the proper policy & signing files for signed images to work fully
